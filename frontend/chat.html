<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class = "chat-conatiner">
    <h1>Chat with Learning Coach</h1>

    <p class="subtitle">
        Ask your AI Learning Coach about your learning journey.
    </p>

    <div id = "chatBox">

        <div class = "ai-message">
            Hi ask me anything about your learning journey.
        </div>

    </div>

    <div class = "input-area">
        <input id = "question" type = "text" placeholder = "Ask something...">
        <button id = "sendBtn">Send</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
