<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat – AI Learning Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="chat.css">
</head>
<body>

    <div class="bg-mesh" aria-hidden="true"></div>

    <div class="chat-container">

        <header class="chat-header">
            <a class="logo" href="index.html">
                <span class="logo-dot"></span>
                Learning Coach
            </a>
            <div class="chat-header-info">
                <span class="chat-title">Chat with Learning Coach</span>
                <span class="chat-subtitle">Ask your AI coach about your learning journey.</span>
            </div>
            <div class="header-right">
                <div class="header-status">
                    <span class="status-dot"></span>
                    Active
                </div>
                <a class="profile-link" href="profile.html">Profile</a>
            </div>
        </header>

        <div id="chatBox">

            <div class="message ai-message">
                <div class="message-avatar ai-avatar">AI</div>
                <div class="message-bubble">
                    Hi! Ask me anything about your learning journey. I remember your goals and can tailor my explanations to your style.
                </div>
            </div>

        </div>

        <div class="input-area">
            <input
                id="question"
                type="text"
                placeholder="Ask something..."
                autocomplete="off"
            >
            <button id="sendBtn" aria-label="Send message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
